<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo de Adivinhação</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background-color: #f0f0f0;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    input, button {
      padding: 10px;
      margin: 10px;
      width: 80%;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Adivinhe o número (1 a 10)</h2>
  <input type="number" id="palpite" min="1" max="10" placeholder="Digite seu palpite">
  <br>
  <button onclick="verificar()">Tentar</button>
  <p id="resultado"></p>
</div>

<script>
  let numeroSecreto = Math.floor(Math.random() * 10) + 1;

  function verificar() {
    let palpite = document.getElementById("palpite").value;
    let resultado = document.getElementById("resultado");

    if (palpite == numeroSecreto) {
      resultado.innerHTML = "🎉 Acertou! O número era " + numeroSecreto;
      numeroSecreto = Math.floor(Math.random() * 10) + 1; // reinicia
    } else {
      resultado.innerHTML = "❌ Errou! Tente novamente.";
    }
  }
</script>

</body>
</html>
